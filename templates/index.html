<!DOCTYPE html>
<html>
<head>
    <title>Skin Cancer Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        .result-card {
            background-color: #ffffff;
            color: black;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1>🩺 Skin Cancer Detection System</h1>
        <p>Upload a dermatoscopic image to detect skin lesion type</p>
    </div>

    <!-- Upload Card -->
    <div class="card p-4 shadow-lg">
        <form action="/predict" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <input class="form-control" type="file" name="file" required>
            </div>
            <div class="text-center">
                <button class="btn btn-primary btn-lg" type="submit">
                    Predict
                </button>
            </div>
        </form>
    </div>

    <!-- Prediction Result -->
    {% if prediction_text %}
    <div class="result-card mt-4 p-4 shadow-lg text-center">
        <h3 class="text-success">{{ prediction_text }}</h3>
        <h5 class="text-warning">{{ confidence }}</h5>
        <img src="{{ image_path }}" class="img-fluid mt-3" style="max-width: 300px;">
    </div>
    {% endif %}

</div>

</body>
</html>
