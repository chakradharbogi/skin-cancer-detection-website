<!DOCTYPE html>
<html>
<head>
    <title>AI Skin Cancer Detection</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 420px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
            color: white;
        }

        button {
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            border: none;
            padding: 12px 30px;
            color: white;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,198,255,0.5);
        }

        .preview {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 12px;
            display: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
        }

        .prediction {
            font-size: 20px;
            font-weight: bold;
        }

        .confidence {
            margin-top: 5px;
            font-size: 15px;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🧬 AI Skin Cancer Detector</h1>
    <p>Upload a dermoscopic image to analyze skin condition</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required onchange="previewImage(event)">
        <br>
        <button type="submit">Analyze</button>
    </form>

    <img id="preview" class="preview"/>

    {% if prediction %}
    <div class="result">
        <div class="prediction">
            Prediction: {{ prediction }}
        </div>
        <div class="confidence">
            Confidence: {{ confidence }}%
        </div>
    </div>
    {% endif %}
</div>

<script>
function previewImage(event) {
    const preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(event.target.files[0]);
    preview.style.display = "block";
}
</script>

</body>
</html>
